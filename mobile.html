<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="MediReport"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1A6EFF"/>
<title>MediReport Mobile</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'><rect width='100' height='100' rx='22' fill='white' stroke='%231a1a2e' stroke-width='6'/><polyline points='2,50 16,50 23,22 33,78 40,35 47,50 53,50 60,22 70,78 77,36 84,50 98,50' fill='none' stroke='%23E8001C' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/></svg>"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'><rect width='100' height='100' rx='22' fill='%231A6EFF'/><polyline points='2,50 16,50 23,22 33,78 40,35 47,50 53,50 60,22 70,78 77,36 84,50 98,50' fill='none' stroke='white' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/></svg>"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F1F5F9;color:#0F172A;font-size:15px;line-height:1.5;min-height:100vh}
:root{--blue:#1A6EFF;--blue-l:#EAF1FF;--blue-d:#0D4DB3;--green:#16A34A;--green-l:#F0FDF4;--red:#E53935;--red-l:#FDECEA;--amber:#F59E0B;--amber-l:#FEF3C7;--g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g400:#94A3B8;--g500:#64748B;--g700:#334155;--g900:#0F172A}

/* LOGIN */
#ls{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 16px;background:linear-gradient(135deg,#f0f4f8,#e8edf5);overflow-y:auto}
.l-ico{width:64px;height:64px;border-radius:18px;background:transparent;display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;margin:20px auto 10px;box-shadow:none}
.l-tit{font-size:22px;font-weight:900;color:#0F172A;text-align:center;letter-spacing:-1px;margin-bottom:4px}
.l-sub{font-size:13px;color:#64748B;text-align:center;margin-bottom:20px}
.l-card{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
label{display:block;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.l-inp{width:100%;padding:13px 14px;border:2px solid #E2E8F0;border-radius:12px;font-size:16px;outline:none;background:#fff;margin-bottom:14px;font-family:inherit}
.l-inp:focus{border-color:var(--blue)}
.dots{display:flex;gap:10px;justify-content:center;margin:8px 0 14px}
.dot{width:14px;height:14px;border-radius:50%;background:#E2E8F0;transition:.15s}
.dot.on{background:var(--blue)}
.dot.err{background:var(--red)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.k{height:54px;border-radius:12px;background:#F8FAFC;border:2px solid #E2E8F0;font-size:22px;font-weight:700;color:#0F172A;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}
.k:active{background:#EAF1FF;border-color:var(--blue);transform:scale(.94)}
.k.ok{background:var(--blue);color:#fff;border-color:var(--blue)}
.perr{font-size:13px;color:var(--red);text-align:center;min-height:20px;font-weight:600;margin-top:4px}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
.hdr{background:linear-gradient(135deg,var(--blue),var(--blue-d));padding:16px 16px 20px;color:#fff}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hdr-logo{font-size:15px;font-weight:800;color:#fff}
.h-out{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 14px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.p-card{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:14px;display:flex;gap:12px;align-items:center}
.p-av{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.p-name{font-size:19px;font-weight:900;color:#fff}
.p-meta{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px}
.p-consent{font-size:11px;font-weight:700;margin-top:5px;background:rgba(255,255,255,.2);display:inline-block;padding:2px 10px;border-radius:99px;color:#fff}

/* TABS */
.tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #E2E8F0;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 8px;font-size:10px;font-weight:700;color:#94A3B8;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;flex-shrink:0;transition:.15s;user-select:none;flex:1;min-width:0}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.tab-i{font-size:17px}

/* CONTENT */
.ct{flex:1;padding:14px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.stit{font-size:16px;font-weight:800;color:#0F172A;margin-bottom:10px}

/* CARDS */
.card{background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ctit{font-size:13px;font-weight:800;color:#0F172A;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ii{background:#F8FAFC;border-radius:10px;padding:9px 11px}
.ilbl{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.ival{font-size:12px;font-weight:600;color:#0F172A}

/* BADGES */
.b{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700}
.bgn{background:#F0FDF4;color:#16A34A}
.ba{background:#FEF3C7;color:#92400E}
.br{background:#FDECEA;color:#E53935}
.bb{background:#EAF1FF;color:#1A6EFF}
.bgr{background:#F1F5F9;color:#64748B}

/* ALERTS */
.ale{display:flex;gap:9px;padding:10px 13px;border-radius:12px;margin-bottom:9px;align-items:flex-start;font-size:13px}
.ale-r{background:#FDECEA;border:1px solid #FECACA}
.ale-b{background:#EAF1FF;border:1px solid #BFDBFE}

/* LABO */
.lrow{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F8FAFC}
.lrow:last-child{border:none}
.lname{font-size:12px;color:#334155;flex:1}
.lval{font-size:13px;font-weight:800;margin:0 6px}
.lnorm{font-size:10px;color:#94A3B8}
.lok{color:#16A34A}.lwarn{color:#F59E0B}.lbad{color:#E53935}

/* RDV */
.rdvi{display:flex;gap:10px;padding:12px;background:#fff;border-radius:16px;margin-bottom:8px;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.rdvd{width:46px;height:46px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;flex-shrink:0}

/* RX */
.rxi{display:flex;gap:10px;padding:12px;background:#fff;border-radius:16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);align-items:flex-start}
.rxio{width:38px;height:38px;border-radius:9px;background:#EAF1FF;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:#94A3B8}
.empty-i{font-size:48px;display:block;margin-bottom:12px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="ls">
  <div class="l-ico" style="padding:4px;overflow:hidden;box-shadow:none;border:none;background:transparent"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><rect x="1" y="1" width="98" height="98" rx="20" fill="white" stroke="#1a1a2e" stroke-width="1.5"/><polyline points="3,50 17,50 24,26 34,74 41,36 48,50 52,50 59,26 69,74 76,38 83,50 97,50" fill="none" stroke="#E8001C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="l-tit">MediReport <span style="color:var(--blue)">Mobile</span></div>
  <div class="l-sub">Mon dossier de santé</div>
  <div class="l-card">
    <label>Identifiant</label>
    <input id="uid" class="l-inp" type="text" placeholder="Ex : omar.benkirane" autocapitalize="none" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <label>Code PIN</label>
    <div class="dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
    </div>
    <div class="pgrid">
      <div class="k" onclick="p('1')">1</div><div class="k" onclick="p('2')">2</div><div class="k" onclick="p('3')">3</div>
      <div class="k" onclick="p('4')">4</div><div class="k" onclick="p('5')">5</div><div class="k" onclick="p('6')">6</div>
      <div class="k" onclick="p('7')">7</div><div class="k" onclick="p('8')">8</div><div class="k" onclick="p('9')">9</div>
      <div class="k" onclick="p('del')">⌫</div><div class="k" onclick="p('0')">0</div>
      <div class="k ok" onclick="login()">✓</div>
    </div>
    <div class="perr" id="perr"></div>
    <div style="text-align:center;font-size:11px;color:#94A3B8;margin-top:8px">🔒 Accès sécurisé — CNDP Maroc</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Timeout warning -->
  <div id="timeout-banner" style="display:none;background:#FEF3C7;border-bottom:2px solid #FDE68A;padding:10px 16px;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0">
    <div style="font-size:13px;font-weight:600;color:#92400E">⏱ Session expire dans <strong><span id="timeout-count">120</span>s</strong></div>
    <button onclick="extendSession()" style="background:#92400E;color:#fff;border:none;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Rester connecté</button>
  </div>
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-logo" style="display:flex;align-items:center;gap:8px"><div style="width:26px;height:26px;border-radius:7px;background:white;padding:3px;overflow:hidden;flex-shrink:0"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><rect width="100" height="100" rx="22" fill="white"/><polyline points="2,50 16,50 23,22 33,78 40,35 47,50 53,50 60,22 70,78 77,36 84,50 98,50" fill="none" stroke="#E8001C" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>MediReport Mobile</div>
      <button class="h-out" onclick="logout()">Déconnexion</button>
    </div>
    <div class="p-card">
      <div class="p-av" id="pav">?</div>
      <div>
        <div class="p-name" id="pnam">—</div>
        <div class="p-meta" id="pmet">—</div>
        <div id="pconsent"></div>
      </div>
    </div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab on" onclick="switchTab('syn',this)"><span class="tab-i">📋</span>Résumé</div>
    <div class="tab" onclick="switchTab('con',this)"><span class="tab-i">🩺</span>Consultations</div>
    <div class="tab" onclick="switchTab('lab',this)"><span class="tab-i">🧪</span>Labo</div>
    <div class="tab" onclick="switchTab('med',this)"><span class="tab-i">💊</span>Médicaments</div>
    <div class="tab" onclick="switchTab('rdv',this)"><span class="tab-i">📅</span>RDV</div>
    <div class="tab" onclick="switchTab('img',this)"><span class="tab-i">🔬</span>Imagerie</div>
  </div>
  <div class="ct" id="ct"></div>
</div>

<script>
var DB_VER = "v25";
var DB = null, PAT = null, USR = null, pin = "";

function p(v) {
  if (v === "del") { pin = pin.slice(0,-1); }
  else if (pin.length < 6) { pin += v; }
  upd();
  if (pin.length === 6 && document.getElementById("uid").value.trim()) login();
}
function upd() {
  for (var i=0;i<6;i++) {
    var d=document.getElementById("d"+i);
    if(d) d.className="dot"+(i<pin.length?" on":"");
  }
}

function login() {
  var id = document.getElementById("uid").value.trim().toLowerCase();
  var err = document.getElementById("perr");
  err.textContent = "";
  if (!id) { err.textContent = "Saisissez votre identifiant"; return; }
  if (pin.length < 6) { err.textContent = "Saisissez votre code PIN"; return; }

  try {
    var raw = localStorage.getItem("medirecord_db");
    var ver = localStorage.getItem("medirecord_db_version");
    if (raw && ver === DB_VER) DB = JSON.parse(raw);
  } catch(e) { DB = null; }
  if (!DB) DB = buildDB();

  var user = null;
  for (var i=0; i<DB.users.length; i++) {
    if (DB.users[i].login === id && DB.users[i].role === "patient") { user = DB.users[i]; break; }
  }
  if (!user) { err.textContent = "Identifiant non reconnu"; flash(); return; }
  if (pin !== (user.pin || "000000")) { err.textContent = "Code PIN incorrect"; flash(); return; }

  var pat = null;
  for (var j=0; j<DB.patients.length; j++) {
    if (DB.patients[j].id === user.patientId) { pat = DB.patients[j]; break; }
  }
  if (!pat) { err.textContent = "Dossier introuvable"; return; }

  USR = user; PAT = pat; pin = "";
  document.getElementById("ls").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("app").style.flexDirection = "column";
  buildHeader();
  showTab("syn");
  resetTimer();
}

function flash() {
  for (var i=0;i<6;i++) { var d=document.getElementById("d"+i); if(d) d.className="dot err"; }
  pin = "";
  setTimeout(function(){ for(var i=0;i<6;i++){ var d=document.getElementById("d"+i); if(d) d.className="dot"; } }, 800);
}

function logout() {
  clearTimeout(sessionTimer);
  USR=null; PAT=null; pin=""; DB=null;
  document.getElementById("uid").value="";
  upd();
  document.getElementById("perr").textContent="";
  document.getElementById("ls").style.display="flex";
  document.getElementById("app").style.display="none";
}

// ── SESSION TIMEOUT 10 min ────────────────────────────────────────
var sessionTimer = null;
var warnTimer = null;
var TIMEOUT = 15 * 60 * 1000;
var WARN_AT = 13 * 60 * 1000;

function resetTimer() {
  if (!USR) return;
  clearTimeout(sessionTimer);
  clearTimeout(warnTimer);
  var banner = document.getElementById("timeout-banner");
  if (banner) banner.style.display = "none";

  warnTimer = setTimeout(function() {
    if (!USR) return;
    var b = document.getElementById("timeout-banner");
    if (b) { b.style.display = "flex"; startCountdown(120); }
  }, WARN_AT);

  sessionTimer = setTimeout(function() {
    if (!USR) return;
    logout();
  }, TIMEOUT);
}

function startCountdown(s) {
  var el = document.getElementById("timeout-count");
  if (el) el.textContent = s;
  if (s > 0) setTimeout(function(){ startCountdown(s-1); }, 1000);
}

function extendSession() {
  var b = document.getElementById("timeout-banner");
  if (b) b.style.display = "none";
  resetTimer();
}

["touchstart","click","keydown"].forEach(function(ev) {
  document.addEventListener(ev, function(){ if(USR) resetTimer(); }, {passive:true});
});

function buildHeader() {
  var p=PAT;
  document.getElementById("pav").textContent = p.initials||"?";
  document.getElementById("pav").style.background = p.color||"var(--blue)";
  document.getElementById("pnam").textContent = p.prenom+" "+p.nom;
  document.getElementById("pmet").textContent = (p.age||"?")+" ans · Groupe "+(p.groupe||"?")+" · "+(p.ville||"?");
  if (p.consentement) {
    document.getElementById("pconsent").innerHTML = '<div class="p-consent">✓ Consentement du '+p.consentement.date+'</div>';
  }
}

function switchTab(tab, el) {
  document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("on"); });
  el.classList.add("on");
  showTab(tab);
}

function showTab(tab) {
  var ct = document.getElementById("ct");
  var h = "";
  if (tab==="syn") h = tabSyn();
  else if (tab==="con") h = tabCon();
  else if (tab==="lab") h = tabLab();
  else if (tab==="med") h = tabMed();
  else if (tab==="rdv") h = tabRdv();
  else if (tab==="img") h = tabImg();
  ct.innerHTML = h;
  ct.scrollTop = 0;
}

function emp(ico,txt){ return '<div class="empty"><span class="empty-i">'+ico+'</span>'+txt+'</div>'; }
function bdg(t,c){ return '<span class="b '+c+'">'+t+'</span>'; }

function tabSyn() {
  var p=PAT;
  var rx=(DB.rx[p.id]||[]).filter(function(r){return r.s==="active";});
  var cons=DB.consultations[p.id]||[];
  var labs=DB.labos[p.id]||[];
  var months = {Jan:0,Fév:1,Mar:2,Avr:3,Mai:4,Jun:5,Jul:6,Juil:6,Aoû:7,Août:7,Sep:8,Oct:9,Nov:10,Déc:11};
  var nowD = new Date(); nowD.setHours(0,0,0,0);
  var nowFull = new Date();
  var rdvs=(DB.rdv||[]).filter(function(r){
    if(r.patientId!==p.id) return false;
    var mo=months[r.mo]; if(mo===undefined) return true;
    var hParts=(r.h||"00h00").replace("h",":").split(":");
    var d=new Date(nowFull.getFullYear(),mo,parseInt(r.day)||1,parseInt(hParts[0])||0,parseInt(hParts[1])||0);
    return d>nowFull;
  }).sort(function(a,b){
    var da=new Date(nowD.getFullYear(),months[a.mo]||0,parseInt(a.day)||1);
    var db2=new Date(nowD.getFullYear(),months[b.mo]||0,parseInt(b.day)||1);
    if(da-db2!==0) return da-db2;
    return (a.h||"").localeCompare(b.h||"");
  });
  var h="";
  if(p.allergies) p.allergies.forEach(function(a){
    h+='<div class="ale ale-r"><span>⚠️</span><div><strong>Allergie :</strong> '+a+'</div></div>';
  });
  if(p.dialyse) h+='<div class="ale ale-b"><span>💧</span><div><strong>Hémodialyse</strong> · '+p.seances_semaine+' séances/sem.</div></div>';
  h+='<div class="card"><div class="ctit">👤 Mes informations</div><div class="igrid">';
  [["Naissance",p.dob],["Âge",(p.age||"?")+" ans"],["Groupe",p.groupe||"?"],["CIN",p.cin||"—"],["Téléphone",p.tel||"—"],["Ville",p.ville||"—"]].forEach(function(x){
    h+='<div class="ii"><div class="ilbl">'+x[0]+'</div><div class="ival">'+(x[1]||"—")+'</div></div>';
  });
  h+='</div>';
  if(p.antecedents&&p.antecedents.length){
    h+='<div style="margin-top:10px"><div class="ilbl" style="margin-bottom:5px">Antécédents</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
    p.antecedents.forEach(function(x){h+=bdg(x,"bgr")+" ";});h+='</div></div>';
  }
  if(p.pathologies&&p.pathologies.length){
    h+='<div style="margin-top:8px"><div class="ilbl" style="margin-bottom:5px">Pathologies</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
    p.pathologies.forEach(function(x){h+=bdg(x,"bb")+" ";});h+='</div></div>';
  }
  h+='</div>';
  if(rx.length){
    h+='<div class="card"><div class="ctit">💊 Traitements en cours ('+rx.length+')</div>';
    rx.slice(0,3).forEach(function(r){
      h+='<div class="rxi"><div class="rxio">💊</div><div><div style="font-size:14px;font-weight:700">'+r.med+'</div><div style="font-size:12px;color:#64748B">'+r.dos+'</div><div style="font-size:12px;color:var(--blue);font-weight:600">'+r.pos+'</div></div></div>';
    });
    h+='</div>';
  }
  if(labs.length){
    var last=labs[0];var abn=(last.res||[]).filter(function(r){return r.s!=="ok";});
    if(abn.length){
      h+='<div class="card" style="border-left:3px solid var(--amber)"><div class="ctit">⚠️ Résultats anormaux · '+last.date+'</div>';
      abn.forEach(function(r){
        h+='<div class="lrow"><div class="lname">'+r.p+'</div><div class="lval '+(r.s==="bad"?"lbad":"lwarn")+'">'+r.v+' '+r.u+'</div><div class="lnorm">'+r.n+'</div></div>';
      });h+='</div>';
    }
  }
  if(cons.length){
    var c=cons[0];
    h+='<div class="card"><div class="ctit">🩺 Dernière consultation</div>';
    h+='<div style="font-size:11px;color:#94A3B8;margin-bottom:5px">'+c.date+' · '+c.spec+'</div>';
    h+='<div style="font-size:14px;font-weight:700;margin-bottom:5px">'+c.motif+'</div>';

function tabRdv() {
  var months = {Jan:0,Fév:1,Mar:2,Avr:3,Mai:4,Jun:5,Jul:6,Juil:6,Aoû:7,Août:7,Sep:8,Oct:9,Nov:10,Déc:11};
  var now = new Date();
  var all = (DB.rdv||[]).filter(function(r){ return r.patientId===PAT.id; });
  // Filter future RDV only (compare date + time)
  var rdvs = all.filter(function(r){
    var mo = months[r.mo];
    if(mo===undefined) return true;
    var hParts = (r.h||"00h00").replace("h",":").split(":");
    var d = new Date(now.getFullYear(), mo, parseInt(r.day)||1, parseInt(hParts[0])||0, parseInt(hParts[1])||0);
    return d > now;
  });
  // Sort by date then time
  rdvs.sort(function(a,b){
    var da = new Date(now.getFullYear(), months[a.mo]||0, parseInt(a.day)||1);
    var db2 = new Date(now.getFullYear(), months[b.mo]||0, parseInt(b.day)||1);
    if(da-db2 !== 0) return da-db2;
    return (a.h||"").localeCompare(b.h||"");
  });
  if(!rdvs.length) return emp("📅","Aucun rendez-vous à venir");
  var h='<div class="stit">Prochains rendez-vous ('+rdvs.length+')</div>';
  rdvs.forEach(function(r){
    var drU=DB.users.find(function(u){return u.id===r.dr;});
    var drRole=drU?drU.role:"";
    var drName=drU
      ? (["laboratoire","imagerie","pharmacie"].includes(drRole)
          ? (drU.structure||drU.nom)
          : (drU.titre||"Dr.")+" "+(drU.prenom||"")+" "+drU.nom)
      : "—";
    h+='<div class="rdvi"><div class="rdvd" style="background:'+(r.c||"var(--blue)")+'" ><div style="font-size:18px;font-weight:900;line-height:1">'+r.day+'</div><div style="font-size:9px;opacity:.85">'+r.mo+'</div></div><div style="flex:1"><div style="font-size:13px;font-weight:700">'+drName+'</div><div style="font-size:12px;color:var(--blue);font-weight:600;margin-top:1px">'+r.spec+'</div><div style="font-size:12px;color:#64748B;margin-top:1px">'+r.h+' · '+r.motif+'</div><div style="font-size:11px;color:#94A3B8;margin-top:1px">'+(r.lieu||"")+'</div></div>'+bdg("✓ Confirmé","bgn")+'</div>';
  });
  return h;
}

function tabImg() {
